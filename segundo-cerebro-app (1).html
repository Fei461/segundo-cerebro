    @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
    .sc-root, .sc-root * { box-sizing: border-box; }
    .sc-root {
      --paper: #EDE6D8; --paper-raised: #F8F4EA; --ink: #2B2A24; --ink-soft: #7A7363;
      --line: #D9CEB9; --line-strong: #C2B89E;
      --accent-home: #2F5D62; --accent-entreno: #B5512D; --accent-nutricion: #5C7A4E;
      --accent-horario: #A07A1E; --accent-ciclo: #8C5468; --accent-sueno: #3D4F6B;
      --accent-medicamentos: #6B5E8C; --accent-calendario: #4A7A8C; --accent-objetivos: #2E7A52;
      --accent-finanzas: #7A5A2E; --danger: #A3402E;
      font-family: -apple-system, sans-serif; color: var(--ink); background: var(--paper);
      min-height: 100%; display: flex; justify-content: center;
    }
    .sc-shell { width: 100%; max-width: 460px; min-height: 100vh; background: var(--paper); position: relative;
      border-left: 1px solid var(--line); border-right: 1px solid var(--line); padding-bottom: 92px; }
    .sc-serif { font-family: Georgia, serif; }
    .sc-mono { font-family: 'SF Mono', Menlo, monospace; }
    .sc-topbar { padding: 22px 20px 16px; border-bottom: 1px dashed var(--line-strong); display: flex; align-items: baseline; justify-content: space-between; }
    .sc-eyebrow { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); }
    .sc-title { font-family: Georgia, serif; font-weight: 600; font-size: 26px; margin: 2px 0 0; letter-spacing: -0.01em; }
    .sc-page { padding: 18px 16px 24px; }
    .sc-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 14px; position: relative; }
    .sc-tab-label { position: absolute; top: -10px; left: 14px; font-family: 'SF Mono', Menlo, monospace; font-size: 10px;
      letter-spacing: 0.07em; text-transform: uppercase; color: var(--paper); padding: 3px 9px; border-radius: 3px 3px 0 0;
      transform: rotate(-1.2deg); white-space: nowrap; }
    .sc-stat-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .sc-stat-card { flex: 1; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 10px; padding: 13px 14px; min-width: 90px; }
    .sc-stat-number { font-family: 'SF Mono', Menlo, monospace; font-size: 22px; font-weight: 600; line-height: 1.1; }
    .sc-stat-label { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.03em; margin-top: 3px; }
    .sc-section-title { font-family: Georgia, serif; font-weight: 600; font-size: 17px; margin: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
    .sc-section-title:first-child { margin-top: 0; }
    .sc-progress-track { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; margin-top: 6px; }
    .sc-progress-fill { height: 100%; border-radius: 4px; transition: width .35s ease; }
    .sc-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .sc-row + .sc-row { margin-top: 10px; }
    .sc-btn { font-family: -apple-system, sans-serif; font-weight: 500; font-size: 14px; border: none; border-radius: 8px;
      padding: 11px 16px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--ink); color: var(--paper); transition: opacity .15s; }
    .sc-btn:active { opacity: 0.8; }
    .sc-btn.sc-btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--line-strong); }
    .sc-btn.sc-btn-block { width: 100%; }
    .sc-btn.sc-btn-sm { padding: 8px 6px; font-size: 12px; }
    .sc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .sc-iconbtn { width: 34px; height: 34px; border-radius: 999px; border: 1px solid var(--line-strong); background: var(--paper-raised);
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: var(--ink); }
    .sc-iconbtn:active { opacity: 0.7; }
    .sc-chip { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line-strong);
      background: var(--paper-raised); font-size: 13px; cursor: pointer; color: var(--ink); white-space: nowrap; }
    .sc-chip.sc-chip-active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .sc-chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .sc-input, .sc-select, .sc-textarea { width: 100%; font-family: -apple-system, sans-serif; font-size: 14px; padding: 10px 12px;
      border: 1px solid var(--line-strong); border-radius: 8px; background: var(--paper); color: var(--ink); }
    .sc-input.sc-mono { font-family: 'SF Mono', Menlo, monospace; }
    .sc-field { margin-bottom: 12px; }
    .sc-field-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.03em; }
    .sc-segmented { display: flex; border: 1px solid var(--line-strong); border-radius: 9px; overflow: hidden; }
    .sc-segmented button { flex: 1; padding: 10px 6px; font-size: 12.5px; font-weight: 500; border: none; background: var(--paper-raised);
      color: var(--ink-soft); cursor: pointer; font-family: -apple-system, sans-serif; }
    .sc-segmented button + button { border-left: 1px solid var(--line-strong); }
    .sc-segmented button.active { background: var(--ink); color: var(--paper); }
    .sc-empty { text-align: center; padding: 26px 14px; color: var(--ink-soft); font-size: 13.5px; border: 1px dashed var(--line-strong); border-radius: 10px; line-height: 1.5; }
    .sc-divider { border: none; border-top: 1px dashed var(--line-strong); margin: 14px 0; }
    .sc-overlay { position: fixed; inset: 0; background: rgba(43,42,36,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
    .sc-sheet { width: 100%; max-width: 460px; background: var(--paper); border-radius: 18px 18px 0 0; padding: 18px 18px 26px;
      max-height: 88vh; overflow-y: auto; box-shadow: 0 -8px 30px rgba(0,0,0,0.18); }
    .sc-sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .sc-sheet-title { font-family: Georgia, serif; font-weight: 600; font-size: 19px; }
    .sc-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 80; background: var(--ink); color: var(--paper);
      padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
    .sc-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 460px; background: var(--paper-raised);
      border-top: 1px solid var(--line); display: flex; padding: 7px 4px calc(7px + env(safe-area-inset-bottom)); z-index: 40; overflow-x: auto; scrollbar-width: none; }
    .sc-nav::-webkit-scrollbar { display: none; }
    .sc-nav-item { flex: 0 0 48px; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none;
      padding: 7px 1px; cursor: pointer; color: var(--ink-soft); font-family: -apple-system, sans-serif; }
    .sc-nav-item span { font-size: 9.5px; line-height: 1.1; text-align: center; }
    .sc-list-item { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-bottom: 1px dashed var(--line); }
    .sc-list-item:last-child { border-bottom: none; }
    .sc-mod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .sc-mod-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px 8px; background: var(--paper-raised); cursor: pointer;
      display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }
    .sc-mod-card:active { opacity: 0.8; }
    .sc-quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .sc-week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .sc-day-head { font-size: 10.5px; text-align: center; color: var(--ink-soft); font-family: 'SF Mono', Menlo, monospace; }
    .sc-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .sc-cal-cell { aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-family: 'SF Mono', Menlo, monospace; font-size: 12px; cursor: pointer; position: relative; border: 1px solid var(--line); }
    .sc-cal-dot { position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--ink); }
    @media (prefers-reduced-motion: reduce) { .sc-progress-fill, .sc-btn { transition: none; } }

    /* \u2500\u2500 MODO OSCURO \u2500\u2500 */
    .dark.sc-root {
      --paper: #1C1A16; --paper-raised: #242118; --ink: #EDE6D8; --ink-soft: #9A9080;
      --line: #302E28; --line-strong: #3D3A32;
    }
    .dark .sc-input, .dark .sc-select, .dark .sc-textarea { background: #1C1A16; }
    .dark .sc-segmented button { background: #242118; }
    .dark .sc-nav { background: #242118; border-top-color: #302E28; }
